spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.jpa.show-sql=false
spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=604800000

app.admin-seed.email=${ADMIN_SEED_EMAIL:}
app.admin-seed.password=${ADMIN_SEED_PASSWORD:}

app.mail.mode=${MAIL_MODE:smtp}
app.mail.from=${MAIL_FROM:no-reply@daycarelog.local}
app.web.base-url=${WEB_BASE_URL:http://localhost:5173}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

app.email.brevo-api-key=${BREVO_API_KEY:}

app.email.mx-check-enabled=${EMAIL_MX_CHECK_ENABLED:true}

server.port=8080
