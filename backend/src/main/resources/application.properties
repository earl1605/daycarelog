# — Supabase PostgreSQL (via Connection Pooler) —
# prepareThreshold=0 disables server-side prepared statements (required for PgBouncer transaction mode)
# Set DB_URL / DB_USERNAME / DB_PASSWORD as real environment variables (locally or on your deploy
# platform) — never commit actual credentials here.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP — disable prepared statement cache (incompatible with PgBouncer)
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0

# ── JPA / Hibernate ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.jpa.show-sql=false
spring.jackson.serialization.write-dates-as-timestamps=false

# ── JWT ──────────────────────────────────────────────────────────────
# Must be set as a long random string via the JWT_SECRET env var — never commit a real value here.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=604800000

# ── First-admin seeding (one-time; safe to leave unset after the first admin exists) ──
app.admin-seed.email=${ADMIN_SEED_EMAIL:}
app.admin-seed.password=${ADMIN_SEED_PASSWORD:}

# ── Email verification / SMTP ─────────────────────────────────────────
# MAIL_MODE=console logs the verification email to stdout instead of sending it -
# use this for local dev so no real SMTP account is needed. Leave unset (defaults
# to "smtp") in production, where MAIL_HOST/MAIL_USERNAME/MAIL_PASSWORD must be set.
app.mail.mode=${MAIL_MODE:smtp}
app.mail.from=${MAIL_FROM:no-reply@daycarelog.local}
# Public URL of the React web app - used to build the verify-email link in the email.
app.web.base-url=${WEB_BASE_URL:http://localhost:5173}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Registration email guards ─────────────────────────────────────────
# Set to false to skip the DNS MX/A lookup entirely (e.g. offline local dev with
# no internet access). Defaults to true - real deployments should leave it unset.
app.email.mx-check-enabled=${EMAIL_MX_CHECK_ENABLED:true}

# ── Server ───────────────────────────────────────────────────────────
server.port=8080
