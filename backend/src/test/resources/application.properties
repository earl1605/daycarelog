# Test profile: in-memory H2, never touches the real Supabase database.
spring.datasource.url=jdbc:h2:mem:daycarelog-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

app.jwt.secret=test-only-jwt-secret-not-used-in-production-aaaaaaaaaaaa
app.jwt.expiration=604800000

app.admin-seed.email=
app.admin-seed.password=
