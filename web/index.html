<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      // Capture beforeinstallprompt as early as physically possible - it can
      // fire before React finishes mounting and attaches its own listener,
      // and a missed event is gone for the rest of the page's lifetime.
      // This runs before any other script, so nothing can be missed.
      window.__pwaInstallEvent = null
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault()
        window.__pwaInstallEvent = e
        window.dispatchEvent(new Event('pwa-install-ready'))
      })
      window.addEventListener('appinstalled', function () {
        window.__pwaInstallEvent = null
        window.dispatchEvent(new Event('pwa-install-done'))
      })
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#052e16" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>DaycareLog – Barangay Enrollment & Health Tracking</title>
    <meta name="description" content="Digital enrollment and health tracking system for barangay daycare centers in the Philippines." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
